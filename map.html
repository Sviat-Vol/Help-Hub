<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <link rel="stylesheet" href="/static/style_register.css">
    <link rel="stylesheet" href="/static/map.css">
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
        <div class="logo">HelpHub</div>
        <nav class="nav">
            <a href="/">Головна</a>
            <a href="/create_request">Зробити запит</a>
            <a href="/map">Мапа потреб</a>
        </nav>
        </div>
    </header>
    <div id="map"></div>

<button id="openComplaintsBtn" class="open-complaints-btn" onclick="openComplaintsSidebar()" style="display:none;">
    Скарги
</button>


<button id="openUserAdminBtn" class="open-user-admin-btn" onclick="toggleUserAdminPanel()" style="display:none;">
    Видалення користувача
</button>

<div id="userAdminPanel" class="user-admin-panel">
    <div class="user-admin-row">
        <input id="userSearchEmail" type="email" placeholder="Пошта користувача" />
        <button onclick="searchUserForDelete()">Пошук</button>
    </div>
    <div id="userSearchResult" class="user-search-result"></div>
    <div class="user-admin-row">
        <select id="userDeleteReason">
            <option value="">Оберіть причину видалення</option>
            <option value="Розсилка спаму або масових повідомлень">Розсилка спаму або масових повідомлень</option>
            <option value="Підозріла або шахрайська активність">Підозріла або шахрайська активність</option>
            <option value="Поширення забороненого чи незаконного контенту">Поширення забороненого чи незаконного контенту</option>
            <option value="Образлива або агресивна поведінка">Образлива або агресивна поведінка</option>
            <option value="Скарги інших користувачів">Скарги інших користувачів</option>
        </select>
        <button class="danger-btn" onclick="deleteUserByAdmin()">Видалити користувача</button>
    </div>
</div>

<div id="complaintsSidebar" class="sidebar sidebar-left">
    <button onclick="closeComplaintsSidebar()">✖</button>
    <h2>Панель керування</h2>
    <p><b>Список скарг</b></p>
    <div id="complaintsList" class="complaints-list"></div>
</div>

<div id="sidebar" class="sidebar">

    <button onclick="closeSidebar()">✖</button>

    <h2 id="detail-title"></h2>

    <p><b>Опис:</b></p>
    <p id="detail-description"></p>

    <p><b>Статус:</b> <span id="detail-status"></span></p>

    <button id="acceptBtn" onclick="acceptRequest()">Прийняти</button>
    <button id="cancelBtn" onclick="cancelRequest()">Скасувати</button>
    <button id="deleteBtn" onclick="deleteRequestByAdmin()" style="display:none;">Видалити</button>
    <button id="reportBtn" onclick="reportRequest()" style="display:none;">Скарга</button>
    <button id="contactsBtn" onclick="showContacts()" style="display:none;">
        Показати контакти
    </button>

</div>



<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/static/map.js"></script>

</body>
</html>
